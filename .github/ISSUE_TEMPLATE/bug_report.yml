name: "Bug report"
description: "Reporta un problema reproducible"
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Resumen
      description: Qué pasó y por qué es un problema
      placeholder: Descripción breve
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      description: Comandos exactos o pasos
      placeholder: |
        1) ...
        2) ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Resultado esperado
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Resultado actual
    validations:
      required: true
  - type: input
    id: hardware
    attributes:
      label: Hardware
      description: CPU/GPU/RAM
      placeholder: "CPU-only, 16GB RAM"
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidencia / outputs
      description: Logs o artefactos (sin PII)
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacidad
      options:
        - label: "Confirmo que no incluí PII ni secretos"
          required: true
        - label: "Si comparto reportes públicos, pasaron sanitización"
          required: false
